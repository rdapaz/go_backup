name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
            cli-artifact: backup-cli-linux-amd64
            gui-artifact: backup-gui-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: clang -arch x86_64
            cli-artifact: backup-cli-darwin-amd64
            gui-artifact: backup-gui-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang
            cli-artifact: backup-cli-darwin-arm64
            gui-artifact: backup-gui-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            cc: gcc
            cli-artifact: backup-cli-windows-amd64.exe
            gui-artifact: backup-gui-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.cli-artifact }} ./cmd/cli/

      - name: Build GUI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.gui-artifact }} ./cmd/gui/

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.cli-artifact }}
          path: ${{ matrix.cli-artifact }}

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.gui-artifact }}
          path: ${{ matrix.gui-artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
